<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynx Pretext Demos</title>
<style>
  * { box-sizing: border-box; }
  :root {
    color-scheme: light;
    --page: #f5f1ea;
    --panel: #fffdf8;
    --ink: #201b18;
    --muted: #6d645d;
    --rule: #d8cec3;
    --accent: #955f3b;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .page {
    width: min(960px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 32px 0 64px;
  }
  .eyebrow {
    margin: 0 0 8px;
    font: 12px/1.2 "SF Mono", ui-monospace, monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    margin: 0;
    font: 700 34px/1.08 Georgia, "Times New Roman", serif;
  }
  .intro {
    margin: 10px 0 0;
    max-width: 62ch;
    line-height: 1.5;
    color: var(--muted);
  }
  .intro a {
    color: var(--accent);
    text-decoration: underline;
  }
  .intro code {
    font-size: 0.9em;
    padding: 1px 5px;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border-radius: 4px;
  }

  /* Tab bar */
  .tab-bar {
    margin-top: 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0;
  }
  .tab {
    appearance: none;
    border: none;
    background: none;
    font: 500 13px/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
    padding: 8px 14px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .tab:hover {
    color: var(--ink);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
  }

  /* Embed */
  .embed-section {
    margin-top: 16px;
  }
  .embed-container {
    height: 540px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--rule);
    box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    background: #fff;
  }
  .embed-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  @media (max-width: 600px) {
    .page { width: min(100vw - 20px, 960px); padding-top: 22px; }
    .tab { font-size: 12px; padding: 6px 10px; }
    .embed-container { height: 400px; }
  }
</style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">Lynx Pretext</p>
    <h1>Demos</h1>
    <p class="intro">
      Lynx ports of the
      <a href="https://chenglou.me/pretext/" target="_blank" rel="noreferrer">Pretext</a>
      layout demos. These run natively on Lynx via
      <code>getTextInfo()</code> &mdash; scan the QR&nbsp;code on a Lynx-enabled
      device to see them live.
    </p>

    <div class="tab-bar" id="tab-bar"></div>
    <div class="embed-section">
      <div class="embed-container" id="embed"></div>
    </div>
  </main>

  <script type="module">
    // ── Config ──────────────────────────────────────────────────
    // go-web embed endpoint. Change to localhost for local dev:
    //   const GO_EMBED_BASE = 'http://localhost:5969';
    const GO_EMBED_BASE = 'https://go.lynxjs.org';

    // Example assets are served from this site's /examples/ path.
    const EXAMPLE_BASE_PATH = `${window.location.origin}/examples`;

    // ── All demos (matches lynx.config.ts entries) ─────────────
    const demos = [
      { name: 'basic-height',       title: 'Basic Height',       defaultFile: 'pages/basic-height.tsx' },
      { name: 'layout-with-lines',  title: 'Layout with Lines',  defaultFile: 'pages/layout-with-lines.tsx' },
      { name: 'shrinkwrap',         title: 'Shrinkwrap',         defaultFile: 'pages/shrinkwrap.tsx' },
      { name: 'variable-flow',      title: 'Variable Flow',      defaultFile: 'pages/variable-flow.tsx' },
      { name: 'accuracy',           title: 'Accuracy',           defaultFile: 'pages/accuracy.tsx' },
      { name: 'bubbles',            title: 'Bubbles',            defaultFile: 'pages/demos/bubbles.tsx' },
      { name: 'dynamic-layout',     title: 'Dynamic Layout',     defaultFile: 'pages/demos/dynamic-layout.tsx' },
      { name: 'editorial-engine',   title: 'Editorial Engine',   defaultFile: 'pages/demos/editorial-engine.tsx' },
      { name: 'dynamic-layout-mts', title: 'Dynamic Layout MTS', defaultFile: 'pages/demos/dynamic-layout-mts.tsx' },
      { name: 'dynamic-layout-bts', title: 'Dynamic Layout BTS', defaultFile: 'pages/demos/dynamic-layout-bts.tsx' },
      { name: 'editorial-mts',      title: 'Editorial MTS',      defaultFile: 'pages/demos/editorial-mts.tsx' },
      { name: 'wireframe-torus',    title: 'Wireframe Torus',    defaultFile: 'pages/demos/wireframe-torus.tsx' },
    ];

    // ── Embed mount (mirrors go-web/src/embed.ts) ───────────────
    let cleanupFn = null;

    function mount(container, options) {
      const el = typeof container === 'string'
        ? document.querySelector(container) : container;
      if (!el) return;

      // Remove previous iframe
      if (cleanupFn) cleanupFn();

      const embedUrl = new URL(`${GO_EMBED_BASE}/embed`);
      embedUrl.searchParams.set('seamless', '1');

      const iframe = document.createElement('iframe');
      iframe.src = embedUrl.href;
      iframe.style.cssText = 'width:100%;height:100%;border:none';

      function handleMessage(event) {
        if (event.source !== iframe.contentWindow) return;
        if (event.data?.type === 'go-embed:ready') {
          iframe.contentWindow.postMessage(
            { type: 'go-embed:init', options }, '*');
        }
      }
      window.addEventListener('message', handleMessage);
      el.appendChild(iframe);

      cleanupFn = () => {
        window.removeEventListener('message', handleMessage);
        iframe.remove();
        cleanupFn = null;
      };
    }

    // ── Render tabs ─────────────────────────────────────────────
    const tabBar = document.getElementById('tab-bar');

    for (const demo of demos) {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.dataset.example = demo.name;
      btn.textContent = demo.title;
      btn.addEventListener('click', () => switchDemo(demo.name));
      tabBar.appendChild(btn);
    }

    function switchDemo(name) {
      const demo = demos.find(d => d.name === name);
      if (!demo) return;

      // Update active tab
      tabBar.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.example === name));

      // Mount Go web embed for the selected demo
      mount('#embed', {
        example: demo.name,
        defaultFile: demo.defaultFile,
        defaultTab: 'preview',
        exampleBasePath: EXAMPLE_BASE_PATH,
      });

      // Update URL hash for bookmarking
      history.replaceState(null, '', `#${name}`);
    }

    // ── Init: activate from URL hash or first demo ──────────────
    const hashName = location.hash.slice(1);
    const initial = demos.find(d => d.name === hashName) ? hashName : demos[0].name;
    switchDemo(initial);
  </script>
</body>
</html>
